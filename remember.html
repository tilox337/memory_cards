<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background-color: #1a1a1a;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
      }

      #nav {
        position: fixed;
        top: 20px;
        display: flex;
        gap: 10px;
      }

      #nav button {
        background: #333;
        border: 1px solid #444;
        color: #f5f5f5;
        padding: 8px 15px;
        border-radius: 20px;
        cursor: pointer;
      }

      #nav input {
        background: transparent;
        border: none;
        color: inherit;
        width: 80px;
        text-align: center;
      }

      #card {
        width: 350px;
        height: 220px;
        background: linear-gradient(145deg, #232323, #2a2a2a);
        border: 2px solid #3d3d3d;
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        text-align: center;
        padding: 20px;
        cursor: pointer;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        transition: transform 0.2s;
        margin-bottom: 30px;
      }

      #card:active {
        transform: scale(0.95);
      }

      #navi {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 20px;
      }

      #navi button {
        background-color: #444;
        color: white;
        border: none;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        font-size: 1.2rem;
        cursor: pointer;
      }

      #navi button:hover {
        background-color: #555;
      }

      #navi label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.9rem;
        color: #bbb;
        cursor: pointer;
      }

      footer {
        position: fixed;
        bottom: 30px;
      }

      #GoBack {
        background-color: #f44336;
        color: white;
        border: none;
        padding: 10px 25px;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <table>
        <thead>
          <tr id="nav" style="display: flex; align-items: center"></tr>
        </thead>
      </table>
      <div id="card"></div>
      <div style="display: flex" id="navi"></div>
    </main>
    <footer>
      <button id="GoBack">Go back</button>
    </footer>
    <script src="remember.js"></script>
  </body>
</html>
